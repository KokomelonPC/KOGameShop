<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ตะกร้า M-Game | KOGame Shop</title>
  <link rel="stylesheet" href="css/mgame-styles.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="index.html"><img src="assets/brand-mark.svg" alt=""><span>KOGame Shop</span></a>
    <nav class="nav"><a href="index.html">M-Game</a><a class="is-active" href="cart.html">ตะกร้า</a><a href="orders.html">ออเดอร์</a></nav>
    <div class="account-nav"><span data-account></span><a class="cart-link" href="cart.html">ตะกร้า (<span data-cart-count>0</span>)</a></div>

  <main class="page-layout">

      <div class="row-actions">
        <a class="button secondary" href="index.html#price">เลือกเพิ่ม</a>
        <a class="button primary hidden" href="payment.html" data-checkout>ชำระเงิน</a>

    </aside>

  <script src="js/mgame.js"></script>
