<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register | KOGame Shop</title>
  <link rel="stylesheet" href="css/mgame-styles.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="index.html"><img src="assets/brand-mark.svg" alt=""><span>KOGame Shop</span></a>
    <nav class="nav"><a href="index.html">M-Game</a><a href="cart.html">ตะกร้า</a><a href="orders.html">ออเดอร์</a></nav>
    <div class="account-nav"><a class="cart-link" href="cart.html">ตะกร้า (<span data-cart-count>0</span>)</a></div>
  </header>
  <main class="auth-layout">
    <section>
      <p class="eyebrow">Create Account</p>
      <h1>สมัครสมาชิก KOGame Shop</h1>
      <p class="lead">สร้างบัญชีสำหรับทดสอบการสั่งซื้อ M-Game และแจ้งชำระเงิน</p>
    </section>
    <section class="auth-box">
      <h2>Register</h2>
      <form data-register-form>
        <label for="name">ชื่อของคุณ</label>
        <input id="name" type="text" placeholder="ชื่อของคุณ" required>
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="Email" required>
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Password" minlength="6" required>
        <label for="confirmPassword">Confirm Password</label>
        <input id="confirmPassword" type="password" placeholder="Confirm Password" minlength="6" required>
        <button class="button primary" type="submit">Register</button>
      </form>
      <p class="muted">มีบัญชีแล้ว? <a href="login.html"><strong>Login</strong></a></p>
    </section>
  </main>
  <script src="js/mgame.js"></script>
</body>
</html>
